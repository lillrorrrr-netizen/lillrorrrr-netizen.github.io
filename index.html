<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rory Analytics Demo</title>
</head>
  
<body>

  <h1>Welcome to Rory's Analytics Demo</h1>

  <p>A simple landing page for testing Amplitude analytics.</p>
  <p>Please I need a job and I'd be glad to help you guys!</p>

  <button id="signup-btn">Sign Up</button>

  <button id="demo-btn">Request Demo</button>

<script src="https://cdn.amplitude.com/script/c6620f422c9bc730e0be8a114f4c7d1d.js"></script>

<script>
    window.amplitude.init("c6620f422c9bc730e0be8a114f4c7d1d");

    amplitude.track("Page Viewed");

    document.getElementById("signup-btn")
        .addEventListener("click", function() {

        amplitude.track("Sign Up Clicked");

        alert("Sign Up button clicked!");
    });

    document.getElementById("demo-btn")
        .addEventListener("click", function() {

        amplitude.track("Request Demo Clicked");

        alert("Request Demo button clicked!");
    });
</script>

</body>
</html>
